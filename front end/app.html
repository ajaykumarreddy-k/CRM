      function mockResponse(data) {
        return new Response(JSON.stringify(data), {
          status: 200,
          headers: { 'Content-Type': 'application/json' }
        });
      }
      function delay(fn, ms) {
        return new Promise(function(res) { setTimeout(function() { res(fn()); }, ms || 250); });
      }
      function campaignStats(id) {
        var c = CAMPAIGNS.find(function(x){return x.id===id;}) || CAMPAIGNS[0];
        var s = c.sent || 450;
        var delivered = Math.floor(s*0.97), opened = Math.floor(s*0.44),
            clicked = Math.floor(s*0.18), converted = Math.floor(s*0.047), failed = s - delivered;
        return {id:c.id,name:c.name,channel:c.channel,segment:c.segment,status:c.status,
          message:"Hi {{name}}, check out our latest offer! 🎉",
          sent:s,delivered:delivered,opened:opened,clicked:clicked,converted:converted,failed:failed,
          cvr:"4.7%",sentAt:"2025-04-01T14:30:00Z",

        ];
        return insights[(parseInt(id||"1")-1) % insights.length];

      function aiDraft(goal) {
        var g = (goal||"").toLowerCase();
        if (g.includes("follow")) return "Hi {{name}}, just checking in! We have exciting updates this week. Let me know if I can help with anything.";
        if (g.includes("segment")||g.includes("whatsapp")) return "Your WhatsApp segment is updated — 984 contacts included. Ready to launch a campaign?";
        if (g.includes("calendar")||g.includes("newsletter")) return "Q2 newsletter plan:\n• Week 1: Product highlights\n• Week 2: Customer story\n• Week 3: Promo offer\n• Week 4: Feedback survey";
        if (g.includes("conversion")||g.includes("stat")) return "CVR is 4.7% — 23% above industry average. Top segment: 'High-Value Buyers' at 8.2% CVR.";
        return "AI recommendation for \""+goal+"\": Target WhatsApp-preferred customers first for 22% higher open rate. Shall I draft the full campaign message?";

      var _origFetch = window.fetch.bind(window);
      window.fetch = function(input, init) {
        var url = typeof input === 'string' ? input : (input instanceof Request ? input.url : String(input));
        var method = (init && init.method ? init.method : (input instanceof Request ? input.method : 'GET')).toUpperCase();
        var path = url.replace(/^https?:\/\/[^\/]+/, '');

        // Dashboard
        if (path === '/api/dashboard/summary' && method === 'GET')
          return delay(function(){return mockResponse({metrics:{customers:2847,campaigns:14,sent:128430,cvr:4.7,clients:2847,clientsComparison:"+12%",clientsSubtitle:"vs 2,541 last month",revenue:48920,revenueComparison:"+18%",revenueSubtitle:"$41,450 last month",projects:37,projectsComparison:"+6",projectsSubtitle:"31 last month"}});});

        // Customers
        if (path === '/api/customers' && method === 'GET')
          return delay(function(){return mockResponse({customers:CUSTOMERS,total:CUSTOMERS.length});});

        // Segments
        if (path === '/api/segments' && method === 'GET')
          return delay(function(){return mockResponse(SEGMENTS);});
        if (/^\/api\/segments\/[^\/]+$/.test(path) && method === 'GET') {
          var sid = path.split('/').pop();
          return delay(function(){return mockResponse(SEGMENTS.find(function(s){return s.id===sid;})||SEGMENTS[0]);});
        }
        if (path === '/api/segments' && method === 'POST') {
          var body = JSON.parse((init&&init.body)||'{}');
          var ns = Object.assign({id:String(Date.now()),rules:[],count:0,createdAt:new Date().toISOString()},body);
          SEGMENTS.push(ns);
          return delay(function(){return mockResponse(ns);});
        }

        // Campaigns
        if (path === '/api/campaigns' && method === 'GET')
          return delay(function(){return mockResponse(CAMPAIGNS);});
        if (/^\/api\/campaigns\/[^\/]+\/stats$/.test(path) && method === 'GET') {
          var cid = path.split('/')[3];
          return delay(function(){return mockResponse(campaignStats(cid));});
        }
        if (/^\/api\/campaigns\/[^\/]+\/insight$/.test(path) && method === 'GET') {
          var cid2 = path.split('/')[3];
          return delay(function(){return mockResponse(aiInsight(cid2));}, 900);
        }
        if (/^\/api\/campaigns\/[^\/]+$/.test(path) && method === 'GET') {
          var cid3 = path.split('/').pop();
          return delay(function(){return mockResponse(campaignStats(cid3));});
        }
        if (/^\/api\/campaigns\/[^\/]+\/toggle$/.test(path) && method === 'POST') {
          var cid4 = path.split('/')[3];
          var camp = CAMPAIGNS.find(function(c){return c.id===cid4;});
          if (camp) camp.status = camp.status==='Sent'?'Paused':'Sent';
          return delay(function(){return mockResponse({status:camp?camp.status:'Sent'});});
        }
        if (/^\/api\/campaigns\/[^\/]+\/launch$/.test(path) && method === 'POST') {
          var cid5 = path.split('/')[3];
          var camp2 = CAMPAIGNS.find(function(c){return c.id===cid5;});
          if (camp2){camp2.status='Sent';camp2.sent=camp2.sent||250;}
          return delay(function(){return mockResponse({ok:true,status:'Sent',sent:camp2?camp2.sent:250});});
        }
        if (path === '/api/campaigns' && method === 'POST') {
          var cb = JSON.parse((init&&init.body)||'{}');
          var nc = Object.assign({id:String(Date.now()),sent:0,status:'Paused'},cb);
          CAMPAIGNS.push(nc);
          return delay(function(){return mockResponse(nc);});
        }

        // Inbox
        if (path === '/api/inbox' && method === 'GET')
          return delay(function(){return mockResponse(INBOX);});
        if (/^\/api\/inbox\/[^\/]+\/read$/.test(path) && method === 'PUT') {
          var iid = path.split('/')[3];
          var ic = INBOX.find(function(c){return c.id===iid;});
          if (ic) ic.unreadCount = 0;
          return delay(function(){return mockResponse({ok:true});});
        }
        if (/^\/api\/inbox\/[^\/]+\/messages$/.test(path) && method === 'POST') {
          var iid2 = path.split('/')[3];
          var ib = JSON.parse((init&&init.body)||'{}');
          var now = new Date();
          var msg = {id:'m'+Date.now(),sender:ib.sender||'user',text:ib.text||'',
            timestamp:now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})};
          var ic2 = INBOX.find(function(c){return c.id===iid2;});
          if (ic2) ic2.messages.push(msg);
          return delay(function(){return mockResponse(msg);});
        }

        // Products
        if (path === '/api/products' && method === 'GET')
          return delay(function(){return mockResponse(PRODUCTS);});
        if (/^\/api\/products\/[^\/]+$/.test(path) && method === 'GET') {
          var pid = path.split('/').pop();
          return delay(function(){return mockResponse(PRODUCTS.find(function(p){return p.id===pid;})||PRODUCTS[0]);});
        }
        if (path === '/api/products' && method === 'POST') {
          var pb = JSON.parse((init&&init.body)||'{}');
          var np = Object.assign({id:String(Date.now()),sales:0,revenue:0},pb);
          PRODUCTS.push(np);
          return delay(function(){return mockResponse(np);});
        }
        if (/^\/api\/products\/[^\/]+$/.test(path) && method === 'PUT') {
          var puid = path.split('/').pop();
          var pub2 = JSON.parse((init&&init.body)||'{}');
          var pi = PRODUCTS.findIndex(function(p){return p.id===puid;});
          if (pi!==-1) Object.assign(PRODUCTS[pi],pub2);
          return delay(function(){return mockResponse(PRODUCTS[pi]||{});});
        }
        if (/^\/api\/products\/[^\/]+$/.test(path) && method === 'DELETE') {
          var pdid = path.split('/').pop();
          var pdi = PRODUCTS.findIndex(function(p){return p.id===pdid;});
          if (pdi!==-1) PRODUCTS.splice(pdi,1);
          return delay(function(){return mockResponse({ok:true});});
        }

        // Projects
        if (path === '/api/projects' && method === 'GET')
          return delay(function(){return mockResponse(PROJECTS);});
        if (path === '/api/projects' && method === 'POST') {
          var prb = JSON.parse((init&&init.body)||'{}');
          var nprj = Object.assign({id:String(Date.now()),clientAvatar:'https://api.dicebear.com/7.x/avataaars/svg?seed='+Date.now(),hasNote:!!prb.notes},prb);
          PROJECTS.push(nprj);
          return delay(function(){return mockResponse(nprj);});
        }
        if (/^\/api\/projects\/[^\/]+$/.test(path) && method === 'PUT') {
          var prid = path.split('/').pop();
          var prb2 = JSON.parse((init&&init.body)||'{}');
          var pri = PROJECTS.findIndex(function(p){return p.id===prid;});
          if (pri!==-1) Object.assign(PROJECTS[pri],prb2,{hasNote:!!prb2.notes});
          return delay(function(){return mockResponse(PROJECTS[pri]||{});});
        }
        if (/^\/api\/projects\/[^\/]+$/.test(path) && method === 'DELETE') {
          var prdi = PROJECTS.findIndex(function(p){return p.id===path.split('/').pop();});
          if (prdi!==-1) PROJECTS.splice(prdi,1);
          return delay(function(){return mockResponse({ok:true});});
        }

        // AI
        if ((path==='/api/ai/draft'||path==='/api/ai/inbox-draft') && method==='POST') {
          var ab = JSON.parse((init&&init.body)||'{}');
          var goal = ab.goal||ab.contactName||'message';
          return delay(function(){return mockResponse({draft:aiDraft(goal)});}, 800);
        }
        if (path==='/api/ai/segment' && method==='POST')
          return delay(function(){return mockResponse({name:'AI Generated Segment',rules:[{field:'ltv',op:'gt',value:500}],count:287,preview:CUSTOMERS.slice(0,5)});}, 1200);

        // Passthrough to real API
        return _origFetch(input, init);
      };
